# Priority: Critical
# Test ID: C000007 - # Might not match TestRail ID - to be changed if necessary
# Title: Max import
# Expected Result:
#   1. Able to import all wallets successfully
#   2. Avle to sync and read correct balance for each wallet
#   3. Tokens are auto-detected successfully

#   TODO: remove point coordinates hack for iOS
#   TODO: add other wallets
#   TODO: warning when imoporting unsupported assets
# 
# Developer Notes:
#   - Good example of looping syntax

appId: ${MAESTRO_APP_ID}
env:
  MAESTRO_INCLUDE_BIRTHDAY_HEIGHT: true
tags:
- android
- C000007a
- max-import
---
- runFlow:
    file: ../common/launch-cleared.yaml

# Create new account
- runFlow:
    file: ../common/create-account.yaml
    label: "Create new account"

# Dismiss notifications/modals
- runFlow:
    file: ../common/dismiss-modals.yaml
    label: "Dismiss modals"

# Define list of wallets to add and the loop index
# Note: need 2 slashes to escape the parenthesis in the evalScript
# TODO: extract this list as an environment variable in testerConfig
- evalScript: ${
    output.wallets = [
      "Bitcoin \\(Segwit\\)",
      "Bitcoin \\(no Segwit\\)",
      "Bitcoin Cash",
      "Ethereum",
      "Zcash",
      "zkSync",
      "Tron",
      "Polkadot",
      "Optimism",
      "SUI",
      "Ethereum Classic",
      "Solana",
      "Litecoin",
      "XRPL",
      "Rootstock",
      "Stellar",
      "Dash",
      "Tezos",
      "DigiByte",
      "Vertcoin",
      "Ravencoin",
      "Pirate Chain",
      "Qtum",
      "Feathercoin",
      "Groestlcoin",
      "Firo",
      "Fantom",
      "Hedera",
      "Polygon",
      "Avalanche",
      "BNB Smart Chain",
      "Liberland",
      "Coreum",
      "Osmosis",
      "THORChain",
      "BOB",
      "Abstract",
      "Arbitrum One",
      "Axelar",
      "Base",
      "Botanix Bitcoin",
      "Cardano",
      "Celo",
      "Cosmos Hub",
      "Dogecoin",
      "eCash",
      "Filecoin",
      "Filecoin FEVM",
      "FIO",
      "HyperEVM",
      "PIVX",
      "PulseChain",
      "Sonic"
    ];
    output.i = 0;}
# TODO: Zcash and Pirate Chain need birthday height

# Not supported: Ton, Zano, Algorand, Monero

# Begin to add wallets
- tapOn: Assets
- tapOn:
    id: "addButton"


# Select wallets to add (only works on Android)
# Loop over each wallet type to add
# NOT robust to any changes in wallet list order
- repeat:
    while:
      true: ${output.i < output.wallets.length}
      platform: Android
    commands:
      # Set current asset for this iteration
      - evalScript: ${output.currentWallet = output.wallets[output.i]}
      # Scroll until that name is visible
      - scrollUntilVisible:
          element: ${".*" + output.currentWallet + ".*"}
          direction: DOWN
          speed: 1
          timeout: 10000   # tweak as needed
    #   - evalScript: ${console.log("Current wallet is:" + output.currentWallet)}
      # Tap that name
      - tapOn:
          text: ${".*" + output.currentWallet + ".*"}
      # Increment index
      - evalScript: ${output.i = output.i + 1}

# Select wallets to add
- repeat:
    while:
      true: ${output.i < output.wallets.length}
      platform: iOS
    commands:
      - evalScript: ${output.currentWallet = output.wallets[output.i]}
      - tapOn:
            id: "undefined.clearIcon"
            optional: true
      - tapOn:
            id: "undefined.textInput"  
      - inputText: ${output.currentWallet}
      - waitForAnimationToEnd:
          timeout: 5000
      - extendedWaitUntil:
            visible: Choose Wallets to Add
      - tapOn: 
            text: ${".*" + output.currentWallet + ".*"} 
            index: 0
            optional: true
      - tapOn: 
            text: ${".*" + output.currentWallet + ".*"} 
            index: 1
            optional: true
      - tapOn: 
            text: ${".*" + output.currentWallet + ".*"} 
            index: 2
            optional: true
      - tapOn: 
            text: ${".*" + output.currentWallet + ".*"} 
            index: 3
            optional: true
      - tapOn: 
            text: ${".*" + output.currentWallet + ".*"} 
            index: 0
            optional: true
      - tapOn: # Hack
            point: "50%,30%"
      - evalScript: ${output.i = output.i + 1}

# Continue to import wallets
- tapOn: Next
- tapOn: Import Wallets
# Error when selected a wallet that does not support import
- assertNotVisible: Import Key Failed
- tapOn: Private Key or Private Seed
- inputText: ${MAESTRO_EDGE_MAX_IMPORT_SEED}

# Refinement possible
- tapOn:
    text: "Enter your.*" # In scene body to drop keyboard
    optional: true

- extendedWaitUntil:
    visible: "Next"
    timeout: 5000
- tapOn: Next

# Add birthday height for Zcash and Pirate Chain
- runFlow:
    when:
      true: ${MAESTRO_INCLUDE_BIRTHDAY_HEIGHT}
    commands: 
      - assertVisible: Import Options
      
      # Zcash birthday
      - tapOn: Zcash
      - tapOn: 
            text: "Wallet Birthday Height"
            index: 0
            optional: true
      # Ensure proper modal is displayed
      - assertVisible: "The birthday height is the network block height that your wallet will start synchronizing from.*"
      - assertVisible: ""
      # TODO: Add accurate birthday height for Zcash and Pirate Chain
      - inputText: "2000000"
      - pressKey: Enter

      # Pirate Chain birthday
      - tapOn: Pirate Chain
      - tapOn: 
            text: "Wallet Birthday Height"
            index: 1
            optional: true
      # Ensure proper modal is displayed
      - assertVisible: "The birthday height is the network block height that your wallet will start synchronizing from.*"
      - assertVisible: ""
      # TODO: Add accurate birthday height for Zcash and Pirate Chain
      - inputText: "2000000"
      - pressKey: Enter
      - tapOn: Next
    label: "Add birthday height for Zcash and Pirate Chain"

- waitForAnimationToEnd:
    timeout: 60000
    label: "Wait for animation to end so `Next` button is accessible after loading"

# Hack
- repeat:
    while:
       visible: Next
    commands:
      - tapOn: Next
# - tapOn: Next

# Directed to Assets screen to verify wallets are imported
- extendedWaitUntil:
    visible: Assets
    timeout: 30000

# Reset loop index to validate wallet balance/sync
- evalScript: ${output.i = 2}


# - evalScript: ${output.wallets[output.0] = "Bitcoin (Segwit)"}
# - evalScript: ${output.wallets[output.1] = "Bitcoin (no Segwit)"}

# Scroll until see newly added BTC wallet titled "My Bitcoin 2"
- scrollUntilVisible:
    element: "My Bitcoin 2"
    direction: DOWN
    speed: 10
    centerElement: true
    timeout: 50000
# Find each newly added wallet and verify balance
- repeat:
    label: "Verify balance for each wallet"
    while:
      true: ${output.i < output.wallets.length}
    commands:
      - evalScript: ${output.currentWallet = output.wallets[output.i]}
      - scrollUntilVisible:
          element: ${".*" + output.currentWallet + ".*"}
          direction: DOWN
          speed: 5
          centerElement: true
          timeout: 50000
      - tapOn: ${".*" + output.currentWallet + ".*"}
      - extendedWaitUntil:
          visible: Receive
          timeout: 5000

      # TODO: Add assertion to verify correctbalance
      - assertNotVisible: 
          text: "$0.00 USD"
          optional: true
      - scroll
      - assertNotVisible: 
          text: "No transactions yet"
          optional: true

      - tapOn:
          id: "chevronBack"
      - evalScript: ${output.i = output.i + 1}

- stopApp

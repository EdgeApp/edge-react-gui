# Priority: Critical
# Test ID: C000010
# Title: Request for device notification permissions
# Expected Result:
#   1. Verify

appId: ${MAESTRO_APP_ID}
tags:
- all
- C000010
---

# Login to existing account
- runFlow:
    file: ../common/launch-cleared.yaml
- runFlow:
    file: ../common/login-password.yaml
    env:
      USERNAME: ${MAESTRO_EDGE_UTXO_USERNAME}
      PASSWORD: ${MAESTRO_EDGE_UTXO_PASSWORD}

- extendedWaitUntil:
    visible: "Security is Our Priority"
    timeout: 15000
    optional: true


# Create new light account
- runFlow:
    file: ../common/launch-cleared.yaml
- tapOn: Get Started
- tapOn: Next
- tapOn: Next
- tapOn: Next
- tapOn: Next
- inputText: ${MAESTRO_EDGE_NEW_ACCOUNT_PIN}
- tapOn: Next
# Create wallets scene
- waitForAnimationToEnd:
    timeout: 10000

# Request notifications modal appears here on iOS
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: "Security is Our Priority"
          timeout: 5000
      - tapOn:
          text: "Cancel"
          optional: true




# # Create new full account to test?
# - runFlow:
#     file: ../common/create-account.yaml
#     label: "Create new account"
#     env:
#       MAESTRO_EDGE_KEEP_WEB3: true



# Dismiss notifications/modals
- runFlow:
    file: ../common/dismiss-modals.yaml
    label: "Dismiss modals"

# Navigate to Settings
- tapOn:
    id: "sideMenuButton"
- tapOn: "Settings"

# Navigate to Password Reminder
- tapOn: "Password Reminder"
- inputText: ${MAESTRO_EDGE_NEW_ACCOUNT_PASSWORD}
- pressKey: Enter
- inputText: ${MAESTRO_EDGE_NEW_ACCOUNT_PASSWORD}